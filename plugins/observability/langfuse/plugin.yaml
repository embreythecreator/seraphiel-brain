name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Seraphiel — traces conversations, LLM calls, and tool usage. Opt-in via `seraphiel plugins enable observability/langfuse` or `seraphiel tools → Langfuse Observability`."
author: embreythecreator
requires_env:
  - SERAPHIEL_LANGFUSE_PUBLIC_KEY
  - SERAPHIEL_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
